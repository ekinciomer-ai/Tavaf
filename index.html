<meta name="apple-mobile-web-app-capable" content="yes">

  body{
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(212,175,106,0.10), transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 110%, rgba(18,24,41,0.9), transparent),
      var(--night);
    padding:0 0 40px;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(245,239,224,0.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(245,239,224,0.4), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(245,239,224,0.3), transparent),
      radial-gradient(1px 1px at 90% 20%, rgba(245,239,224,0.4), transparent);
  }

  header{ text-align:center; padding:26px 0 10px;}
  header .eyebrow{ font-size:11px; letter-spacing:5px; text-transform:uppercase; color:var(--gold-dim); font-weight:500;}
  header h1{ font-family:'Amiri',serif; font-size:28px; color:var(--gold-bright); margin:6px 0 2px; font-weight:700;}
  header .ar{ font-family:'Amiri',serif; font-size:17px; color:var(--gold); opacity:.8;}

  .dots{ display:flex; justify-content:center; gap:9px; margin:10px 0 4px;}
  .dot{ width:10px; height:10px; border-radius:50%; border:1.5px solid var(--gold-dim); background:transparent; transition:all .4s ease;}
  .dot.done{ background:var(--gold); border-color:var(--gold); box-shadow:0 0 10px rgba(212,175,106,0.6);}
  .dot.active{ border-color:var(--gold-bright); box-shadow:0 0 12px rgba(240,217,160,0.7); animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}
  .shavt-label{ text-align:center; font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--text-dim); letter-spacing:1px;}
  .shavt-label b{ color:var(--gold-bright); font-weight:600;}

  .progress-wrap{ margin:14px 0 6px;}
  .progress-bar{ height:4px; background:rgba(245,239,224,0.08); border-radius:4px; overflow:hidden;}
  .progress-fill{ height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright)); width:0%; transition:width .4s ease; border-radius:4px;}
  .progress-text{ text-align:center; font-size:11px; color:var(--gold-dim); margin-top:6px; letter-spacing:1px;}

  /* Ana öbek kartı */
  .obek-card{ background:linear-gradient(165deg, rgba(212,175,106,0.07), rgba(18,24,41,0.4)); border:1px solid var(--line); border-radius:24px; padding:40px 26px; margin-top:14px; min-height:240px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 16px 40px -22px rgba(0,0,0,0.7);}
  .obek-text{ font-size:30px; line-height:1.55; text-align:center; color:var(--gold-bright); font-weight:500; transition:opacity .3s; text-shadow:0 0 26px rgba(240,217,160,0.25);}
  .obek-text.speaking{ animation:glow 1.4s ease-in-out infinite;}
  @keyframes glow{0%,100%{text-shadow:0 0 22px rgba(240,217,160,0.25);}50%{text-shadow:0 0 36px rgba(240,217,160,0.6);}}
  .obek-status{ margin-top:22px; font-size:13px; color:var(--text-dim); min-height:18px; letter-spacing:.5px;}
  .obek-status.listening{ color:var(--gold-bright);}
  .obek-status.ok{ color:var(--green);}

  /* Kontroller */
  .controls{ display:flex; align-items:center; justify-content:center; gap:12px; margin-top:22px;}
  .ctrl{ font-family:'Jost',sans-serif; cursor:pointer; border-radius:30px; font-weight:600; letter-spacing:.4px; transition:all .18s; border:1px solid var(--line);}
  .ctrl:active{ transform:scale(.95);}
  .ctrl.main{ flex:1; max-width:220px; background:linear-gradient(135deg,var(--gold),var(--gold-dim)); color:#0a0e1a; border:none; padding:17px 20px; font-size:16px; box-shadow:0 8px 24px -8px rgba(212,175,106,0.6);}
  .ctrl.side{ background:rgba(245,239,224,0.05); color:var(--cream); padding:15px 16px; font-size:14px;}

  .bottom-row{ display:flex; justify-content:space-between; gap:10px; margin-top:14px;}
  .bottom-row .ctrl{ flex:1; padding:13px 10px; font-size:13px; font-weight:500;}

  .note{ font-size:12px; color:var(--gold-dim); text-align:center; margin-top:24px; line-height:1.7; padding:0 6px;}

  /* Başlangıç / bitiş kartları */
  .start-card{ background:linear-gradient(165deg, rgba(212,175,106,0.08), rgba(18,24,41,0.5)); border:1px solid var(--line); border-radius:24px; padding:34px 26px; text-align:center; margin-top:14px; box-shadow:0 16px 40px -22px rgba(0,0,0,0.7);}
  .start-card h2{ font-family:'Cormorant Garamond',serif; font-size:23px; color:var(--gold-bright); font-weight:600; margin-bottom:8px;}
  .start-card .lead{ font-size:14px; color:var(--text-dim); line-height:1.75; margin-bottom:22px;}
  .big-btn{ font-family:'Jost',sans-serif; cursor:pointer; border:none; border-radius:14px; padding:16px 22px; font-size:16px; font-weight:600; letter-spacing:.5px;
    background:linear-gradient(135deg,var(--gold),var(--gold-bright)); color:#0a0e1a; box-shadow:0 8px 24px -8px rgba(212,175,106,0.6); width:100%;}
  .big-btn:active{ transform:scale(.97);}
  .done-screen{ text-align:center; padding:34px 12px;}
  .done-screen .ar{ font-family:'Amiri',serif; font-size:26px; color:var(--gold-bright); line-height:1.8;}
  .done-screen p{ color:var(--text-dim); margin-top:14px; font-family:'Cormorant Garamond',serif; font-size:17px; font-style:italic; line-height:1.6;}
</style>
</head>

      "İbadetinle meşgul et ki günaha muhtaç olmayayım.",
      "Lütfunu ver ki başkasına muhtaç olmayayım.",
      "Ey bağışlaması bol olan Rabbim!",
      "Rabbimiz! Bize dünyada iyilik ver, ahirette de iyilik ver.",
      "Bizi cehennem azabından koru.",
      "İyilerle birlikte cennete koy.",
      "Ey sınırsız güç sahibi!",
      "Ey günahları çok bağışlayan!",
      "Ey âlemlerin Rabbi!",
    ]
  },
  {
    no:7,
    obekler:[
      "Bismillahi Allahu Ekber!",
      "Allah'ım! Sana inanarak,",
      "kitabını tasdik ederek,",
      "sana verdiğim sözü tutarak",
      "ve Peygamberinin sünnetine uyarak buradayım.",
      "Allah, her türlü noksandan uzaktır.",
      "Hamd Allah'a mahsustur.",
      "Allah'tan başka hiçbir ilah yoktur.",
      "Allah en büyüktür.",
      "Bütün güç ve kuvvet, şanı yüce olan Allah'a aittir.",
      "Salat ve selam Efendimiz Muhammed'in,",
      "ev halkının ve ashabının üzerine olsun.",
      "Allah'ım! Senden kâmil bir iman, doğru bir inanç,",
      "bol ve helal güzel rızık, ürperen bir kalp,",
      "seni zikreden bir lisan,",
      "asla bozmayacağım samimi bir tövbe ve faydalı ilim niyaz ediyorum.",
      "Allah'ım! Senden hidayet, takva, iffet ve zenginlik vermeni niyaz ediyorum.",
      "Allah'ım! Senden sağlık, iffet, emanete riayet,",
      "güzel ahlâk ve takdire rıza niyaz ediyorum.",
      "Allah'ım! Senden hayırlar ve güzellikler işlemeyi,",
      "kötülükleri terk etmeyi, yoksulları sevmeyi,",
      "beni bağışlaman ve bana merhamet etmeni niyaz ediyorum.",
      "Allah'ım! Geçmişte işlediğim tüm günahlarımı bağışla.",
      "Ömrümün geriye kalan kısmında da beni günah işlemekten muhafaza buyur.",
      "Bana razı olacağın tertemiz işler yapmayı nasip eyle.",
      "Allah'ım! Beni göz açıp kapayacak kadar bile nefsime bırakma.",
      "Bana lütfettiğin güzellikleri benden çekip alma.",
      "Rabbimiz! Kıyamet gününde beni, anamı, babamı ve bütün müminleri bağışla.",
      "Rabbimiz! Bize dünyada iyilik ver, ahirette de iyilik ver.",
      "Bizi cehennem azabından koru.",
      "İyilerle birlikte cennete koy.",
      "Ey sınırsız güç sahibi!",
      "Ey günahları çok bağışlayan!",
      "Ey âlemlerin Rabbi!",
    ]
  }
];
let phase='intro';
let shavtIndex=0;     // hangi şavt (0 tabanlı)
let obekIndex=0;      // hangi öbek
let curAudio=null;    // çalan ses
let otoTimer=null;    // otomatik geçiş zamanlayıcı
let otoMod=true;      // otomatik geçiş açık mı
const BEKLEME=1500;   // ses bitince tekrar için bekleme (ms)

const dotsEl=document.getElementById('dots');
const labelEl=document.getElementById('shavtLabel');
const main=document.getElementById('main');
const noteEl=document.getElementById('note');

function buildDots(){
  dotsEl.innerHTML='';
  for(let i=0;i<7;i++){ const d=document.createElement('div'); d.className='dot';
    if(i<shavtIndex) d.classList.add('done'); else if(i===shavtIndex && phase==='shavt') d.classList.add('active');
    dotsEl.appendChild(d); }
}

function renderIntro(){
  phase='intro'; labelEl.innerHTML='Hazırlık'; buildDots();
  main.innerHTML=`<div class="start-card">
    <h2>Tavafa Hazırlık</h2>
    <div class="lead">Hacerü'l-Esved hizasına gelin, Kâbe sol omzunuzda kalsın. Her öbek okunur, siz tekrar edersiniz; ses bittikten birkaç saniye sonra otomatik ilerler. İsterseniz "Devam" ile elle de geçebilirsiniz.</div>
    <button class="big-btn" id="beginBtn">Tavafa Başla</button>
  </div>`;
  document.getElementById('beginBtn').addEventListener('click', ()=>{ shavtIndex=0; obekIndex=0; renderShavt(); });
}

function renderShavt(){
  phase='shavt'; buildDots();
  const sh=shavtlar[shavtIndex];
  labelEl.innerHTML=`Şavt <b>${sh.no}</b> / 7`;
  if(noteEl) noteEl.style.display='';
  main.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      <div class="progress-text" id="ptext"></div>
    </div>
    <div class="obek-card">
      <div class="obek-text" id="obekText"></div>
      <div class="obek-status" id="obekStatus"></div>
    </div>
    <div class="controls">
      <button class="ctrl side" id="replayBtn">🔊 Tekrar dinle</button>
      <button class="ctrl main" id="contBtn">Devam ▸</button>
    </div>
    <div class="bottom-row">
      <button class="ctrl" id="backBtn">◂ Geri</button>
      <button class="ctrl" id="nextShavtBtn">Sonraki Şavt ▸▸</button>
    </div>
    <div class="bottom-row" style="margin-top:10px;">
      <button class="ctrl" id="otoBtn" style="flex:1;">⏱ Otomatik: AÇIK</button>
    </div>`;
  document.getElementById('contBtn').addEventListener('click', elleDevam);
  document.getElementById('replayBtn').addEventListener('click', tekrarDinle);
  document.getElementById('backBtn').addEventListener('click', geri);
  document.getElementById('nextShavtBtn').addEventListener('click', sonrakiShavt);
  document.getElementById('otoBtn').addEventListener('click', toggleOto);
  obekIndex=0;
  showObek();
}

function showObek(){
  clearTimeout(otoTimer);
  const sh=shavtlar[shavtIndex];
  const total=sh.obekler.length;
  const txt=sh.obekler[obekIndex];
  const tEl=document.getElementById('obekText');
  if(tEl) tEl.textContent=txt;
  const fill=document.getElementById('pfill');
  const ptext=document.getElementById('ptext');
  if(fill) fill.style.width=((obekIndex+1)/total*100)+'%';
  if(ptext) ptext.textContent=`Öbek ${obekIndex+1} / ${total}`;
  const backBtn=document.getElementById('backBtn');
  if(backBtn) backBtn.style.opacity = obekIndex===0 ? '0.4' : '1';
  calObek();
}

function calObek(){
  clearTimeout(otoTimer);
  const sh=shavtlar[shavtIndex];
  const txt=sh.obekler[obekIndex];
  const status=document.getElementById('obekStatus');
  const tEl=document.getElementById('obekText');

  if(curAudio){ curAudio.pause(); curAudio=null; }
  if('speechSynthesis' in window) speechSynthesis.cancel();

  const n=String(obekIndex+1).padStart(2,'0');
  const dosya=`savt${sh.no}_${n}.mp3`;

  if(status){ status.textContent='🔊 Dinleyin…'; status.className='obek-status'; }
  if(tEl) tEl.classList.add('speaking');

  curAudio=new Audio(dosya);
  curAudio.onended=()=>{ if(tEl) tEl.classList.remove('speaking'); sesBitti(); };
  curAudio.onerror=()=>{
    // mp3 yoksa cihaz sesiyle oku (yedek)
    if(tEl) tEl.classList.remove('speaking');
    if('speechSynthesis' in window){
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(txt);
      u.lang='tr-TR'; u.rate=0.85;
      u.onend=()=>sesBitti();
      u.onerror=()=>sesBitti();
      speechSynthesis.speak(u);
    } else { sesBitti(); }
  };
  curAudio.play().catch(()=>{ /* otomatik çalma engellenirse Tekrar dinle ile çalar */ });
}

// ses bitti — kısa bekle, otomatik geç
function sesBitti(){
  const status=document.getElementById('obekStatus');
  if(otoMod){
    if(status){ status.textContent='🔁 Şimdi siz tekrar edin…'; status.className='obek-status listening'; }
    clearTimeout(otoTimer);
    otoTimer=setTimeout(()=>{ ilerle(); }, BEKLEME);
  } else {
    if(status){ status.textContent='🔁 Tekrar edin, sonra "Devam"'; status.className='obek-status listening'; }
  }
}

// otomatik ilerleme
function ilerle(){
  const sh=shavtlar[shavtIndex];
  if(obekIndex < sh.obekler.length-1){
    obekIndex++; showObek();
  } else {
    sonrakiShavt();
  }
}

// elle "Devam"
function elleDevam(){
  clearTimeout(otoTimer);
  ilerle();
}

function tekrarDinle(){
  clearTimeout(otoTimer);
  calObek();
}

function geri(){
  clearTimeout(otoTimer);
  if(obekIndex>0){ obekIndex--; showObek(); }
}

function sonrakiShavt(){
  clearTimeout(otoTimer);
  if(curAudio){ curAudio.pause(); curAudio=null; }
  if('speechSynthesis' in window) speechSynthesis.cancel();
  if(shavtIndex < shavtlar.length-1){
    shavtIndex++; obekIndex=0; renderShavt();
  } else {
    finish();
  }
}

function toggleOto(){
  otoMod=!otoMod;
  const b=document.getElementById('otoBtn');
  if(otoMod){
    if(b){ b.textContent='⏱ Otomatik: AÇIK'; b.style.opacity='1'; }
  } else {
    clearTimeout(otoTimer);
    if(b){ b.textContent='⏱ Otomatik: KAPALI'; b.style.opacity='0.5'; }
    const status=document.getElementById('obekStatus');
    if(status){ status.textContent='🔁 Tekrar edin, sonra "Devam"'; status.className='obek-status listening'; }
  }
}

function finish(){
  phase='done';
  clearTimeout(otoTimer);
  if(curAudio){ curAudio.pause(); curAudio=null; }
  if('speechSynthesis' in window) speechSynthesis.cancel();
  shavtIndex=7;
  buildDots();
  labelEl.innerHTML=`Tavaf tamamlandı · <b>7</b> / 7`;
  if(noteEl) noteEl.style.display='none';
  main.innerHTML=`<div class="done-screen">
    <div class="ar">تَقَبَّلَ اللهُ طَوَافَكَ</div>
    <p>Allah tavafınızı kabul etsin.<br>7 şavt tamamlandı. Makâm-ı İbrahim arkasında<br>iki rekât tavaf namazı kılınır, ardından zemzem içilir.</p>
    <div style="margin-top:24px;"><button class="big-btn" onclick="location.reload()">Yeniden Başla</button></div>
  </div>`;
}

renderIntro();
</script>
