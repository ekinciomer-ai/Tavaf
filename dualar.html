<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dualar</title>
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --night:#0a0e1a; --night-2:#121829; --gold:#d4af6a; --gold-bright:#f0d9a0;
    --gold-dim:#8a7548; --cream:#f5efe0; --text-dim:#9aa0b0; --line:rgba(212,175,106,0.18);
  }
  html,body{ background:var(--night); color:var(--cream); font-family:'Jost',sans-serif; overflow-x:hidden; min-height:100vh; -webkit-font-smoothing:antialiased;}
  body{
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(212,175,106,0.10), transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 110%, rgba(18,24,41,0.9), transparent),
      var(--night);
    padding:0 0 40px;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(245,239,224,0.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(245,239,224,0.4), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(245,239,224,0.3), transparent),
      radial-gradient(1px 1px at 90% 20%, rgba(245,239,224,0.4), transparent);
  }
  .wrap{ position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 20px;}
  header{ text-align:center; padding:26px 0 10px;}
  header .eyebrow{ font-size:11px; letter-spacing:5px; text-transform:uppercase; color:var(--gold-dim); font-weight:500;}
  header h1{ font-family:'Amiri',serif; font-size:28px; color:var(--gold-bright); margin:6px 0 2px; font-weight:700;}
  header .ar{ font-family:'Amiri',serif; font-size:17px; color:var(--gold); opacity:.8;}

  .dua-list{ margin-top:18px; display:flex; flex-direction:column; gap:12px;}
  .dua-card{ background:linear-gradient(165deg, rgba(212,175,106,0.07), rgba(18,24,41,0.4)); border:1px solid var(--line); border-radius:18px; padding:20px 18px; cursor:pointer; transition:all .2s; display:flex; justify-content:space-between; align-items:center;}
  .dua-card:active{ transform:scale(.97);}
  .dua-card .d-tr{ font-size:16px; color:var(--cream); font-weight:500;}
  .dua-card .d-ar{ font-family:'Amiri',serif; font-size:18px; color:var(--gold-bright);}
  .dua-card .d-sub{ font-size:11px; color:var(--text-dim); margin-top:3px;}

  .lead{ font-size:13.5px; color:var(--text-dim); line-height:1.7; text-align:center; margin:14px 4px 0;}

  /* Okuma ekrani */
  .read-label{ text-align:center; font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--gold-bright); letter-spacing:1px; margin-top:6px; font-weight:600;}
  .progress-wrap{ margin:14px 0 6px;}
  .progress-bar{ height:4px; background:rgba(245,239,224,0.08); border-radius:4px; overflow:hidden;}
  .progress-fill{ height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright)); width:0%; transition:width .4s ease; border-radius:4px;}
  .progress-text{ text-align:center; font-size:11px; color:var(--gold-dim); margin-top:6px; letter-spacing:1px;}

  .madde-card{ background:linear-gradient(165deg, rgba(212,175,106,0.07), rgba(18,24,41,0.4)); border:1px solid var(--line); border-radius:24px; padding:44px 26px; margin-top:14px; min-height:260px; display:flex; align-items:center; justify-content:center; box-shadow:0 16px 40px -22px rgba(0,0,0,0.7); cursor:pointer;}
  .madde-text{ font-size:25px; line-height:1.65; text-align:center; color:var(--gold-bright); font-weight:500; text-shadow:0 0 22px rgba(240,217,160,0.22);}

  .hint{ text-align:center; font-size:12px; color:var(--gold-dim); margin-top:12px; letter-spacing:.5px;}

  .controls{ display:flex; align-items:center; justify-content:center; gap:12px; margin-top:18px;}
  .ctrl{ font-family:'Jost',sans-serif; cursor:pointer; border-radius:30px; font-weight:600; letter-spacing:.4px; transition:all .18s; border:1px solid var(--line); background:rgba(245,239,224,0.05); color:var(--cream); padding:15px 20px; font-size:15px; flex:1;}
  .ctrl:active{ transform:scale(.95);}
  .ctrl.main{ background:linear-gradient(135deg,var(--gold),var(--gold-dim)); color:#0a0e1a; border:none; box-shadow:0 8px 24px -8px rgba(212,175,106,0.6);}
  .back-link{ display:inline-block; margin-top:18px; color:var(--gold); font-size:13px; cursor:pointer; border-bottom:1px solid var(--line); padding-bottom:2px;}
  .center{ text-align:center; }
  .kaynak{ font-size:11px; color:var(--gold-dim); text-align:center; margin-top:16px; line-height:1.6; font-style:italic; padding:0 10px;}
  .note{ font-size:12px; color:var(--gold-dim); text-align:center; margin-top:22px; line-height:1.7; padding:0 6px;}
</style>
</head>

   "Dünyada Zemzem suyundan kana kana içme imkânı verdiğin gibi, âhirette de Kevser Havzı'ndan içmeyi, beratımızı sağ elimize alarak Sıratı kolayca geçmeyi, sevdiklerimizle birlikte cennetine girmeyi bizlere nasip ve müyesser eyle Allah'ım!",
   "Allah'ım, içtiğimiz zemzemi; cümle hastalıklarımıza şifa, maddî ve manevî dertlerimize deva, ruhlarımıza gıda, akıllarımıza ziya eyle.",

   "Ya İlahi! Senin yolunda, vatan ve millet uğruna şehit düşen ciğerparelerimize, aziz şehitlerimizin hepsine gani gani rahmet eyle! Kederli ailelerine bol ecir, sabır ve metanet ihsan eyle! Gazilerimizden vefat edenlere rahmet, sağ olanlara sıhhat ve afiyetler ihsan eyle Allah'ım!",
   "Yüce Allah'ım! Sen kardeşliği, barışı, adaleti ve doğruluğu bizlere emrettin! Bizler de bu ağır yükleri taşımak için Sana söz verdik Allah'ım! Bizleri sözüne sadık kalanlardan eyle Allah'ım!",
   "Ya Rabbi! Sen mükerrem kıldığın kullarının dualarına icabet edeceğini, günahlarını itiraf edip bağışlanma dilediklerinde onları bağışlayacağını müjdeledin! İşte suçlarımız. İşte itiraflarımız. İşte bağışlanma yakarışlarımız. Bizleri bağışla Allah'ım!",
   "Lütuf ve rahmeti sonsuz olan Allah'ım! Bizleri işitip akleden, düşünüp kavrayan, adaletle tedbir alan kullarından eyle! Bu isyanlarımız karşısında yardımını, lütfunu biz Âdemoğullarından esirgeme Allah'ım!",
   "Ya Rabbe'l-Âlemin! Dünyanın dört bir yanından gelen; dilleri, ırkları, renkleri ve âdetleri farklı, ama iman, niyet, duygu ve düşünceleri aynı olan milyonlarca Müslüman'ı Arafat'ta buluşturduğun gibi, kalplerimizi de sevginle buluştur ve kaynaştır Allah'ım!",
   "Bizleri ayrılıklardan uzaklaştır, maddî ve manevî güçlerimizi birleştir, aramızdaki dayanışmayı güçlendir, ahirette de cennetinde buluştur yâ Rabbi!",
   "Yâ Rabbe'l-Âlemin! Dünyanın her neresinde olursa olsun ezilen, üzülen, horlanan, işkence gören; açlık, kıtlık ve sefalet çeken mazlumlara, biçarelere imdat eyle, himmetini, yardımını üzerlerinden esirgeme!",
   "Server-i Asfiya Efendimizin; 'Kim Allah için hacceder; hayâsızlık ve günahlardan sakınırsa, anasından doğduğu günkü gibi masum olarak memleketine döner' hadis-i şerifine uygun bir şekilde haccımızı yapabilmeyi ve günahlarımızdan tamamen arınarak yurdumuza, yuvamıza kavuşabilmeyi nasip ve müyesser eyle Allah'ım!",
   "Yüce Allah'ım! Evimize döndükten sonra da; hata ve günahlarımızı tekrarlamadan, haramlara sapmadan, haksızlıklara arka çıkmadan, tefrikaya düşmeden, kimsenin hakkına hukukuna tecavüz etmeden, hatır gönül yıkmadan, şeytana, nefsimize, heva ve hevesimize uymadan, rızana ve dinine uygun bir şekilde yeni bir aşk, ihlas ve samimiyetle hayatımızı sürdürebilmeyi bizlere nasip ve müyesser eyle Allah'ım!",
   "Arafat'ta arınan yüreklerimizi tertemiz tutabilmeyi bizlere ihsan eyle Allah'ım! Bizlere hacı olmayı nasip ettiğin gibi, ömür boyu hacı olarak kalmayı da nasip ve müyesser eyle.",
   "Yâ Rabbe'l-Âlemin! Aşkınla tutuşan gönüller hürmetine, zikrinle coşan diller hürmetine, gözlerden akan yaşlar hürmetine, huzurunda eğilen başlar hürmetine; Âhir ve âkıbetimizi hayreyle Allah'ım! Dünya ve ahretimizi mamur eyle Allah'ım!",
   "Bizleri sağlık ve âfiyette daim eyle! Ahlâkımızı güzel eyle! Kötülerle ve kötülüklerle karşılaştırma Allah'ım! Dert verip derman aratma! Dayanılmaz acılar verme! Bizleri darda ve zorda koyma! Senden başkasına muhtaç etme Allah'ım!",
   "Son nefesimizde bizleri iman-ı kâmilden ayırma! Şeytanı imanımıza musallat eyleme! Bizlere ölüm acısı çektirme, kabir azabı yaşatma Allah'ım! Mahşer günü yüzlerimizi kara çıkartma! Bizleri naîm cennetinin vârislerinden eyle Allah'ım!",
   "Allah'ım! Hac farizasını ifa etmek üzere yola çıkan, ancak Arafat'a ulaşamadan vefat eden kardeşlerimize de rahmetinle muamele eyle! Sen onların hac larını da yapılmış kabul eyle!",
   "Bizlere de haccımızın kalan menasikini, kazasız belâsız, elemsiz kedersiz tamamlayarak yurdumuza, yuvamıza salimen ve gânimen kavuşmayı nasip eyle Allah'ım!",
   "Âmin! Velhamdü lillâhi Rabbi'l-Âlemin."

   "Meali: Rabbimiz! Onları da, onların babalarından, eşlerinden ve soylarından iyi olanları da, kendilerine va'd ettiğin Adn cennetlerine koy. Şüphesiz sen mutlak güç sahibisin, hüküm ve hikmet sahibisin.",
   "(Mü'min/Gâfir, 8)",
   "32) Rabbene'ğfir lenâ ve li-ihvâninellezîne sebekûnâ bi'l-îmâni ve lâ tec'al fî kulûbinâ ğıllen li'llezîne âmenû, Rabbenâ inneke Raûfü'r-Rahîm.",
   "Meali: Rabbimiz! Bizi ve bizden önce iman etmiş olan kardeşlerimizi bağışla. Kalplerimizde, iman edenlere karşı hiçbir kin tutturma! Rabbimiz! Şüphesiz sen çok esirgeyicisin, çok merhametlisin.",
   "(Haşr, 10)",
   "33) Rabbenâ aleyke tevekkelnâ ve ileyke enebnâ ve ileyke'l-masîr.",
   "Meali: Rabbimiz! Ancak sana güvendik, içtenlikle yalnız sana yöneldik, dönüş de ancak sanadır.",
   "(Mümtehine, 4)",
   "34) Rabbenâ lâ tec'alnâ fitneten li'llezîne keferû ve'ğfir lenâ Rabbenâ, inneke ente'l-Azîzü'l-Hakîm.",
   "Meali: Rabbimiz! Bizi, inkâr edenlerin zulmüne uğratma. Bizi bağışla. Ey Rabbimiz! Şüphesiz sen mutlak güç sahibisin, hüküm ve hikmet sahibisin.",

   "35) Rabbenâ etmim lenâ nûrenâ ve'ğfir lenâ, inneke alâ külli şey'in kadîr.",
   "Meali: Rabbimiz! Nûrumuzu bizim için tamamla, bizi bağışla. Şüphesiz senin her şeye gücün yeter.",
   "(Tahrîm, 8)"
  ]
 },
 {

   "Hz. Nûh'un (a.s.) Duaları",

   "(Nûh, 28)",
   "Hz. İbrâhîm'in (a.s.) Duaları",

   "(Bakara, 126)",

   "(İbrâhîm, 40-41)",

   "Hz. Yûsuf'un (a.s.) Duası",

   "Meali: Rabbim! Zindan bana, bunların beni dâvet ettiği şeyden daha sevimlidir. Onların tuzaklarını benden uzaklaştırmazsan, onlara meyleder ve cahillerden olurum.",
   "(Yûsuf, 33)",
   "Rabbi kad âteytenî mine'l-mülki ve allemtenî min te'vîli'l-ehâdîs, fâtıra's-semâvâti ve'l-ard, ente veliyyî fi'd-dünyâ ve'l-âhirah, teveffenî müslimen ve elhıknî bi's-sâlihîn.",
   "Meali: Rabbim! Bana mülk verdin ve bana sözlerin yorumunu öğrettin. Ey gökleri ve yeri yaratan! Sen dünyada da ahirette de benim velimsin. Benim canımı müslüman olarak al ve beni salihlere kat.",
   "(Yûsuf, 101)",
   "Hz. Mûsâ'nın (a.s.) Duaları",
   "Rabbi'şrah lî sadrî, ve yessir lî emrî, vahlül ukdeten min lisânî, yefkahû kavlî.",
   "Meali: Rabbim! Gönlüme genişlik ver. İşimi kolaylaştır. Dilimdeki düğümü çöz ki sözümü anlasınlar.",
   "(Tâhâ, 25-28)",
   "Rabbi innî zalemtü nefsî fe'ğfir lî.",

   "Rabbi innî limâ enzelte ileyye min hayrin fakîr.",
   "Meali: Rabbim! Şüphesiz ben senin bana indirdiğin her hayra muhtacım.",

   "Meali: Rabbim! Beni zalimler topluluğundan kurtar.",
   "(Kasas, 21)",
   "Hz. Eyyûb'un (a.s.) Duası",

   "Meali: Senden başka hiçbir ilah yoktur. Seni eksikliklerden uzak tutarım. Ben gerçekten (nefsine) zulmedenlerden oldum.",
   "(Enbiyâ, 87)",

   "(Âl-i İmrân, 38)",
   "Rabbi lâ tezernî ferden ve ente hayru'l-vârisîn.",
   "Meali: Rabbim! Beni tek başıma bırakma. Sen, vârislerin en hayırlısısın.",
   "(Enbiyâ, 89)",
   "Hz. Süleyman'ın (a.s.) Duası",
   "Rabbi evzı'nî en eşküra ni'meteke'lletî en'amte aleyye ve alâ vâlideyye ve en a'mele sâlihan terdâhü ve edhilnî bi-rahmetike fî ibâdike's-sâlihîn.",
   "Meali: Rabbim! Beni; bana ve ana-babama verdiğin nimetlere şükretmeye ve razı olacağın salih ameller işlemeye sevk et ve beni rahmetinle salih kullarının arasına kat.",

   "Hz. Îsâ'nın (a.s.) Duası",

   "Meali: Ey Rabbimiz olan Allah'ım! Bize gökten bir sofra indir ki; önce gelenimize ve sonra gelenimize bir bayram ve senden bir mucize olsun. Bizi rızıklandır. Sen, rızıklandıranların en hayırlısısın.",
   "(Mâide, 114)",
   "Hz. Muhammed'in (s.a.v.) Kuran'daki Duaları",

   "(Tâhâ, 114)",

   "Rabbi edhilnî müdhale sıdkın ve ahricnî muhrace sıdkın ve'c'al lî min ledünke sultânen nasîrâ.",
   "Meali: Rabbim! Beni gireceğim yere doğrulukla girdir ve çıkacağım yerden doğrulukla çıkar. Bana, katından, yardım edici bir kuvvet ver.",

 {
  "ad": "Kuran'da Özel Dualar (Âmenerresûlü, Âyetel Kürsî, Esmâ-i Hüsnâ)",
  "ar": "أدعية مختارة من القرآن",
  "kaynak": "Âmenerresûlü, Âyetel Kürsî, Esmâ-i Hüsnâ ayetleri, sığınma (eûzü) duaları, Furkân kullarının duası. Kaynak: Diyanet meali.",
  "maddeler": [
   "Âmenerresûlü (Bakara 285-286)",
   "Âmene'r-rasûlü bimâ ünzile ileyhi min Rabbihî ve'l-mü'minûn, küllün âmene billâhi ve melâiketihî ve kütübihî ve rusülih, lâ nüferriku beyne ehadin min rusülih, ve kâlû semi'nâ ve eta'nâ, ğufrâneke Rabbenâ ve ileyke'l-masîr.",
   "Meali: Peygamber, Rabbinden kendisine indirilene iman etti, mü'minler de. Hepsi Allah'a, meleklerine, kitaplarına ve peygamberlerine iman ettiler. 'Onun peygamberlerinden hiçbirini ayırt etmeyiz' dediler. 'İşittik ve itaat ettik. Ey Rabbimiz, senden bağışlama dileriz. Dönüş ancak sanadır' dediler.",
   "(Bakara, 285)",
   "Lâ yükellifullâhü nefsen illâ vüs'ahâ, lehâ mâ kesebet ve aleyhâ me'ktesebet. Rabbenâ lâ tüâhıznâ in nesînâ ev ahta'nâ. Rabbenâ ve lâ tahmil aleynâ ısran kemâ hameltehû ale'llezîne min kablinâ. Rabbenâ ve lâ tühammilnâ mâ lâ tâkate lenâ bih, va'fü annâ ve'ğfir lenâ ve'rhamnâ, ente Mevlânâ fe'nsurnâ ale'l-kavmi'l-kâfirîn.",
   "Meali: Allah, bir kimseyi ancak gücünün yettiği şeyle yükümlü kılar. Onun kazandığı iyilik kendi yararına, kötülük de kendi zararınadır. (Şöyle diyerek dua edin:) 'Ey Rabbimiz! Unutur, ya da yanılırsak bizi sorumlu tutma! Ey Rabbimiz! Bize, bizden öncekilere yüklediğin gibi ağır yük yükleme. Ey Rabbimiz! Bize gücümüzün yetmediği şeyleri yükleme! Bizi affet, bizi bağışla, bize acı! Sen bizim Mevlâ'mızsın. Kâfirler topluluğuna karşı bize yardım et.'",
   "(Bakara, 286)",
   "Âyetel Kürsî (Bakara 255)",
   "Allâhü lâ ilâhe illâ hüve'l-Hayyü'l-Kayyûm, lâ te'huzühû sinetün ve lâ nevm. Lehû mâ fi's-semâvâti vemâ fi'l-ard. Men ze'llezî yeşfeu indehû illâ bi-iznih. Ya'lemü mâ beyne eydîhim ve mâ halfehüm. Ve lâ yühîtûne bi-şey'in min ılmihî illâ bimâ şâ'. Vesia kürsiyyühü's-semâvâti ve'l-ard. Ve lâ yeûdühû hıfzuhümâ ve hüve'l-Aliyyü'l-Azîm.",
   "Meali: Allah'tan başka hiçbir ilah yoktur. O daima diridir, bütün varlığın idaresini yürütendir. Onu ne uyuklama tutar ne de uyku. Göklerdeki her şey, yerdeki her şey onundur. İzni olmaksızın onun katında şefaatte bulunacak kimdir? O, kullarının önlerindekini ve arkalarındakini (yaptıklarını ve yapacaklarını) bilir. Onlar onun ilminden, kendisinin dilediği kadarından başka bir şey kavrayamazlar. Onun kürsüsü bütün gökleri ve yeri kaplayıp kuşatmıştır. Onları koruyup gözetmek O'na güç gelmez. O, yücedir, büyüktür.",
   "(Bakara, 255)",
   "Furkân Kullarının Duası",
   "Rabbenâ heb lenâ min ezvâcinâ ve zürriyyâtinâ kurrate a'yünin ve'c'alnâ li'l-müttakîne imâmâ.",
   "Meali: Rabbimiz! Eşlerimizi ve çocuklarımızı bize göz aydınlığı kıl ve bizi takva sahiplerine önder eyle.",
   "(Furkân, 74)",
   "Sığınma Duaları (Eûzü)",
   "Eûzü billâhi mine'ş-şeytâni'r-racîm.",
   "Meali: Kovulmuş şeytanın şerrinden Allah'a sığınırım.",
   "(Nahl, 98)",
   "Kul eûzü bi-Rabbi'l-felak, min şerri mâ halak.",
   "Meali: De ki: Yarattığı şeylerin kötülüğünden, sabahın Rabbine sığınırım.",
   "(Felak, 1-2)",
   "Kul eûzü bi-Rabbi'n-nâs, Meliki'n-nâs, İlâhi'n-nâs.",
   "Meali: De ki: İnsanların kralı, insanların ilahı olan, insanların Rabbine sığınırım.",
   "(Nâs, 1-3)",
   "Rabbi eûzü bike min hemezâti'ş-şeyâtîn, ve eûzü bike Rabbi en yahdurûn.",
   "Meali: Rabbim! Şeytanların vesveselerinden sana sığınırım. Rabbim, onların yanımda bulunmalarından da sana sığınırım.",
   "(Mü'minûn, 97-98)",
   "Müslüman Olarak Vefat Etme Duası",
   "Teveffenî müslimen ve elhıknî bi's-sâlihîn.",
   "Meali: Benim canımı müslüman olarak al ve beni salihlere kat.",
   "(Yûsuf, 101)",
   "Esmâ-i Hüsnâ Ayetleri (Haşr 22-24)",
   "Hüvellâhüllezî lâ ilâhe illâ hüve, âlimü'l-ğaybi ve'ş-şehâdeh, hüve'r-Rahmânü'r-Rahîm.",
   "Meali: O, kendisinden başka hiçbir ilah olmayan Allah'tır. Gaybı da, görünen âlemi de bilendir. O, Rahmân'dır, Rahîm'dir.",
   "(Haşr, 22)",
   "Hüvellâhüllezî lâ ilâhe illâ hüve, el-Melikü'l-Kuddûsü's-Selâmü'l-Mü'minü'l-Müheyminü'l-Azîzü'l-Cebbâru'l-Mütekebbir, sübhânallâhi ammâ yüşrikûn.",
   "Meali: O, kendisinden başka hiçbir ilah bulunmayan Allah'tır. O, mülkün gerçek sahibi, kutsal (her türlü eksiklikten uzak), barış ve esenliğin kaynağı, güvenlik veren, gözetip koruyan, mutlak güç sahibi, düzeltip ıslah eden ve dilediğini yaptıran ve büyüklükte eşi olmayandır. Allah, onların ortak koştuklarından uzaktır.",
   "(Haşr, 23)",
   "Hüvellâhü'l-Hâliku'l-Bâriü'l-Musavviru lehü'l-esmâü'l-hüsnâ, yüsebbihu lehû mâ fi's-semâvâti ve'l-ard, ve hüve'l-Azîzü'l-Hakîm.",
   "Meali: O, yaratan, yoktan var eden, şekil veren Allah'tır. Güzel isimler onundur. Göklerdeki ve yerdeki her şey onu tesbih eder. O, mutlak güç sahibidir, hüküm ve hikmet sahibidir.",
   "(Haşr, 24)",
   "Peygamber'e Salât Duası",
   "Innallâhe ve melâiketehû yusallûne ale'n-nebiyy, yâ eyyühe'llezîne âmenû sallû aleyhi ve sellimû teslîmâ.",
   "Meali: Şüphesiz Allah ve melekleri Peygamber'e salât ediyorlar. Ey iman edenler! Siz de ona salât edin, selam edin.",
   "(Ahzâb, 56)",
   "Musibet Anında Okunan Dua",
   "İnnâ lillâhi ve innâ ileyhi râciûn.",
   "Meali: Şüphesiz biz Allah'a aitiz ve şüphesiz ona döneceğiz.",
   "(Bakara, 156)",
   "Hasbiyallâh Duası",
   "Hasbiyallâhü lâ ilâhe illâ hû, aleyhi tevekkeltü ve hüve Rabbü'l-Arşi'l-azîm.",
   "Meali: Allah bana yeter, ondan başka hiçbir ilah yoktur. Ben ona dayandım. O, büyük Arş'ın Rabbidir.",
   "(Tevbe, 129)"
  ]
 },
 {
  "ad": "Kişisel Dualar (Kendin İçin)",
  "ar": "أدعية شخصية",
  "kaynak": "Peygamberimizin (s.a.v.) sünnetinden, kişinin kendisi için edebileceği dualar. Kaynaklar: Buhârî, Müslim, Tirmizî.",
  "maddeler": [
   "1. En Kapsamlı Dua (Peygamberimizin Duası)",
   "Rabbenâ âtinâ fi'd-dünyâ haseneten ve fi'l-âhireti haseneten ve kınâ azâben-nâr.",
   "Anlamı: Rabbimiz! Bize dünyada da iyilik ver, ahirette de iyilik ver ve bizi ateş azabından koru.",
   "2. Afiyet ve Bağışlanma Duası (Peygamberimizin Sünneti)",
   "Allâhümme innî zalemtü nefsî zulmen kesîran ve lâ yağfirü'z-zünûbe illâ ente, fağfir lî mağfireten min indik, ve'rhamnî, inneke ente'l-Ğafûru'r-Rahîm.",
   "Anlamı: Allah'ım! Şüphesiz ben kendime çok zulmettim (günah işledim). Günahları bağışlayacak olan sadece sensin. Katından bir bağışlama ile beni bağışla ve bana merhamet et. Şüphesiz sen, çok bağışlayan ve çok merhamet edensin.",
   "3. Her Şeyin Hayırlısını İsteme Duası",
   "Allâhümme innî es'elüke mine'l-hayri küllihî, âcilihî ve âcilihî, mâ alimtü minhü ve mâ lem a'lem. Ve eûzü bike mine'ş-şerri küllihî, âcilihî ve âcilihî, mâ alimtü minhü ve mâ lem a'lem.",
   "Allâhümme innî es'elüke min hayri mâ seeleke abdüke ve nebiyyüke. Ve eûzü bike min şerri mâ âze bihî abdüke ve nebiyyüke.",
   "Allâhümme innî es'elükel-cennete ve mâ karrabe ileyhâ min kavlin ev amelin. Ve eûzü bike mine'n-nâri ve mâ karrabe ileyhâ min kavlin ev amelin. Ve es'elüke en tec'ale külle kadâin kadaytehû lî hayran.",
   "Anlamı: Allah'ım! Bildiğim ve bilmediğim, acil olan ve sonraya kalan her türlü hayrı senden isterim. Bildiğim ve bilmediğim, acil olan ve sonraya kalan her türlü şerden de sana sığınırım. Kulun ve peygamberin Muhammed'in senden istediği hayrı ben de isterim; sana sığındığı şerden ben de sana sığınırım. Senden cenneti ve ona yaklaştıran her söz ve ameli isterim; cehennemden ve ona yaklaştıran her söz ve amelden sana sığınırım. Benim için takdir ettiğin her işi hayırlı kılmanı senden isterim.",
   "4. Şifa, İman ve Huzur Duası (Peygamberimizin Özlü Duası)",
   "Allâhümme innî es'elüke's-sıhhate ve'l-âfiyete ve'l-emânete ve hüsne'l-hulkı ve'r-rıdâ bi'l-kader.",
   "Anlamı: Allah'ım! Senden sağlık, afiyet, emanete sadakat, güzel ahlak ve kaderine rıza göstermeyi diliyorum.",
   "Duaya başlarken ve bitirirken Allah'a hamd edin, Peygamber Efendimize (s.a.v.) salavat getirin. Kendi dilinizle, içinizden geldiği gibi samimi ettiğiniz dualar da en makbul olanlardır."
  ]
 }
];

let duaIndex=0, maddeIndex=0;
const main=document.getElementById('main');
const noteEl=document.getElementById('note');

function renderListe(){
  let cards='';
  DUALAR.forEach((d,i)=>{
    cards+=`<div class="dua-card" onclick="acDua(${i})">
      <div>
        <div class="d-tr">${d.ad}</div>
        <div class="d-sub">${d.maddeler.length} bölüm</div>
      </div>
      <div class="d-ar">${d.ar||''}</div>
    </div>`;
  });
  main.innerHTML=`<div class="lead">Okumak istediğiniz duayı seçin. Ekrana dokundukça sıradaki bölüme geçer.</div>
    <div class="dua-list">${cards}</div>`;
  if(noteEl) noteEl.textContent="Şimdilik okumalıktır; ileride sesli de eklenecek.";
}

function acDua(i){
  duaIndex=i; maddeIndex=0;
  renderOkuma();
}

function renderOkuma(){
  const d=DUALAR[duaIndex];
  main.innerHTML=`
    <div class="read-label">${d.ad}</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      <div class="progress-text" id="ptext"></div>
    </div>
    <div class="madde-card" id="maddeCard">
      <div class="madde-text" id="maddeText"></div>
    </div>
    <div class="hint">Devam etmek için karta dokunun</div>
    <div class="controls">
      <button class="ctrl" id="prevBtn">◂ Önceki</button>
      <button class="ctrl main" id="nextBtn">Sonraki ▸</button>
    </div>
    <div class="kaynak" id="kaynakBox"></div>
    <div class="center"><span class="back-link" onclick="renderListe()">‹ Dualara dön</span></div>`;
  document.getElementById('maddeCard').addEventListener('click', sonraki);
  document.getElementById('nextBtn').addEventListener('click', sonraki);
  document.getElementById('prevBtn').addEventListener('click', onceki);
  if(noteEl) noteEl.textContent="";
  showMadde();
}

function showMadde(){
  const d=DUALAR[duaIndex];
  const kb=document.getElementById('kaynakBox');
  if(kb && d.kaynak) kb.textContent='Kaynak: '+d.kaynak;
  const toplam=d.maddeler.length;
  const tEl=document.getElementById('maddeText');
  if(tEl) tEl.textContent=d.maddeler[maddeIndex];
  const fill=document.getElementById('pfill');
  const ptext=document.getElementById('ptext');
  if(fill) fill.style.width=((maddeIndex+1)/toplam*100)+'%';
  if(ptext) ptext.textContent=`${maddeIndex+1} / ${toplam}`;
  const prevBtn=document.getElementById('prevBtn');
  if(prevBtn) prevBtn.style.opacity = maddeIndex===0 ? '0.4' : '1';
  const nextBtn=document.getElementById('nextBtn');
  if(nextBtn) nextBtn.textContent = (maddeIndex===toplam-1) ? 'Bitti ✓' : 'Sonraki ▸';
}

function sonraki(){
  const d=DUALAR[duaIndex];
  if(maddeIndex < d.maddeler.length-1){
    maddeIndex++; showMadde();
  } else {
    // bitti — listeye dön
    renderListe();
  }
}
function onceki(){
  if(maddeIndex>0){ maddeIndex--; showMadde(); }
}

renderListe();
</script>
</body>
</html>
